name: CI Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

jobs:
  # ─── Job 1: Build & Test ───────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          sudo apt-get install -y tidy
          tidy -e src/index.html || echo "HTML warnings detected but continuing..."

      - name: Confirm Build Artifact
        run: |
          echo "Build complete"
          ls -la src/

  # ─── Job 2: Security Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Scan filesystem for vulnerabilities (CVEs, secrets, misconfigs)
      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0              # don't block pipeline; alert instead
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt

      # Check for hardcoded secrets
      - name: Scan for Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # OSSF Scorecard — open-source security posture
      - name: OSSF Scorecard
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: scorecard.json
          results_format: json
          publish_results: false
        continue-on-error: true

  # ─── Job 3: Alert ─────────────────────────────────────────────────
  alert:
    name: Send Alert
    runs-on: ubuntu-latest
    needs: security
    if: always()

    steps:
      - name: Download Trivy Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-security-report
        continue-on-error: true

      - name: Check for Vulnerabilities
        id: check
        run: |
          if [ -f trivy-report.txt ] && grep -qE "CRITICAL|HIGH" trivy-report.txt; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "summary=$(grep -cE 'CRITICAL|HIGH' trivy-report.txt) HIGH/CRITICAL issues found" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "summary=No critical vulnerabilities detected" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Alert (Vulnerabilities Found)
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: DevOps Pipeline <${{ secrets.MAIL_USERNAME }}>
          subject: "⚠️ [${{ github.repository }}] Security Alert on ${{ github.ref_name }}"
          body: |
            🚨 SECURITY ALERT — ${{ github.repository }}

            Branch   : ${{ github.ref_name }}
            Commit   : ${{ github.sha }}
            Triggered: ${{ github.actor }}

            Summary  : ${{ steps.check.outputs.summary }}

            View full report:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            — DevOps CI Pipeline

      - name: Send Email Alert (Pipeline OK)
        if: steps.check.outputs.found == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: DevOps Pipeline <${{ secrets.MAIL_USERNAME }}>
          subject: "✅ [${{ github.repository }}] Pipeline Passed — ${{ github.ref_name }}"
          body: |
            ✅ ALL CHECKS PASSED — ${{ github.repository }}

            Branch   : ${{ github.ref_name }}
            Commit   : ${{ github.sha }}
            Triggered: ${{ github.actor }}

            No critical vulnerabilities detected.

            — DevOps CI Pipeline

  # ─── Job 4: Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          commit_message: "deploy: ${{ github.sha }}"
