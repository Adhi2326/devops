name: CI Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          sudo apt-get install -y tidy
          tidy -e src/index.html || exit 0

      - name: Confirm Build Artifact
        run: ls -la src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt

  alert:
    name: Send Alert
    runs-on: ubuntu-latest
    needs: security
    if: always()
    steps:
      - name: Download Trivy Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-security-report
        continue-on-error: true

      - name: Check for Vulnerabilities
        id: check
        run: |
          if [ -f trivy-report.txt ]; then
            if grep -qE "CRITICAL|HIGH" trivy-report.txt; then
              echo "found=true" >> $GITHUB_OUTPUT
              echo "summary=$(grep -cE 'CRITICAL|HIGH' trivy-report.txt) issues found" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "summary=No critical vulnerabilities detected" >> $GITHUB_OUTPUT
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "summary=Scan skipped" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Alert
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: DevOps Pipeline <${{ secrets.MAIL_USERNAME }}>
          subject: "Pipeline Status: ${{ steps.check.outputs.summary }}"
          body: |
            Status: ${{ steps.check.outputs.summary }}
            Commit: ${{ github.sha }}
            Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}